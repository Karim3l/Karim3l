<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Git.Karim Product Owner hero section</title>
  <desc id="desc">A portfolio hero section inspired by Git.Karim, presenting Karim Elfengour as Product Owner Digital and E-Commerce.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#0F172A" flood-opacity=".10"/>
    </filter>
    <linearGradient id="soft" x1="0" y1="0" x2="1200" y2="560">
      <stop stop-color="#FFFFFF"/>
      <stop offset=".58" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F3F7F5"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00956B"/>
      <stop offset="1" stop-color="#006B4D"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="560" rx="24" fill="url(#soft)"/>
  <rect y="0" width="1200" height="70" fill="#FFFFFF" opacity=".92"/>
  <line x1="0" y1="70" x2="1200" y2="70" stroke="#E5E7EB"/>

  <g transform="translate(48 24)">
    <path d="M14 0L0 12L14 24" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M33 0L47 12L33 24" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M29 1L19 23" stroke="#00956B" stroke-width="4" stroke-linecap="round"/>
    <text x="68" y="20" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Git.Karim</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#334155">
    <text x="320" y="42">Accueil</text>
    <text x="405" y="42">Mon approche</text>
    <text x="525" y="42">Projets</text>
    <text x="605" y="42">Expérience</text>
    <text x="715" y="42">Compétences</text>
    <text x="845" y="42">À propos</text>
    <text x="940" y="42">Contact</text>
  </g>
  <line x1="320" y1="70" x2="363" y2="70" stroke="#00956B" stroke-width="3"/>
  <rect x="1010" y="18" width="140" height="34" rx="8" fill="#FFFFFF" stroke="#00956B"/>
  <text x="1045" y="40" fill="#006B4D" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800">Télécharger mon CV</text>
  <path d="M1028 27v11m0 0l-5-5m5 5l5-5" stroke="#006B4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(60 118)">
    <rect width="250" height="26" rx="13" fill="#E9F8F2"/>
    <circle cx="17" cy="13" r="4" fill="#00956B"/>
    <text x="30" y="17" fill="#007A58" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="900">DISPONIBLE POUR UN POSTE DE PRODUCT OWNER</text>
  </g>

  <text x="60" y="208" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900">Product Owner Digital</text>
  <text x="60" y="266" fill="#008A64" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900">&amp; E-Commerce</text>
  <text x="60" y="322" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">De la vision produit à l'impact business.</text>
  <text x="60" y="362" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">
    <tspan x="60" dy="0">J'accompagne les entreprises dans la conception et la livraison de produits</tspan>
    <tspan x="60" dy="24">digitaux utiles, adoptés et rentables. Cadrage, roadmap, backlog, UX/UI,</tspan>
    <tspan x="60" dy="24">coordination agile, recette et amélioration continue.</tspan>
  </text>

  <g transform="translate(60 428)" font-family="Inter, Arial, sans-serif">
    <g>
      <circle cx="16" cy="16" r="15" fill="#E9F8F2"/>
      <path d="M16 15a6 6 0 100-12 6 6 0 000 12zm-10 15c2-7 18-7 20 0" stroke="#00956B" stroke-width="2" stroke-linecap="round"/>
      <text x="42" y="13" fill="#0F172A" font-size="18" font-weight="900">9+ ans</text>
      <text x="42" y="34" fill="#475569" font-size="12" font-weight="700">d'expérience</text>
    </g>
    <g transform="translate(150 0)">
      <circle cx="16" cy="16" r="15" fill="#E9F8F2"/>
      <path d="M9 12h14v14H9zM13 12V8h6v4" stroke="#00956B" stroke-width="2" stroke-linejoin="round"/>
      <text x="42" y="13" fill="#0F172A" font-size="18" font-weight="900">20+</text>
      <text x="42" y="34" fill="#475569" font-size="12" font-weight="700">projets livrés</text>
    </g>
    <g transform="translate(290 0)">
      <circle cx="16" cy="16" r="15" fill="#E9F8F2"/>
      <path d="M10 22l5-5 4 4 7-10" stroke="#00956B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="13" fill="#0F172A" font-size="18" font-weight="900">100%</text>
      <text x="42" y="34" fill="#475569" font-size="12" font-weight="700">orienté utilisateur</text>
    </g>
    <g transform="translate(455 0)">
      <circle cx="16" cy="16" r="15" fill="#F3F4F6"/>
      <path d="M12 18a4 4 0 110-8 4 4 0 010 8zm10 7a4 4 0 110-8 4 4 0 010 8zm-8-9l5 4" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
      <text x="42" y="13" fill="#0F172A" font-size="18" font-weight="900">Agile</text>
      <text x="42" y="34" fill="#475569" font-size="12" font-weight="700">Scrum / Kanban</text>
    </g>
  </g>

  <g transform="translate(60 500)" font-family="Inter, Arial, sans-serif">
    <rect width="142" height="42" rx="7" fill="url(#green)"/>
    <text x="34" y="27" fill="#FFFFFF" font-size="13" font-weight="900">Voir mes projets</text>
    <rect x="160" width="126" height="42" rx="7" fill="#FFFFFF" stroke="#D1D5DB"/>
    <text x="190" y="27" fill="#111827" font-size="13" font-weight="900">Me contacter</text>
    <text x="355" y="27" fill="#111827" font-size="13" font-weight="900">Télécharger mon CV</text>
    <path d="M336 13v14m0 0l-6-6m6 6l6-6" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(710 105)" filter="url(#shadow)">
    <rect width="420" height="420" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="18" y="18" width="384" height="288" rx="6" fill="#D1D5DB"/>
    <rect x="18" y="18" width="384" height="288" rx="6" fill="#111827" opacity=".10"/>
    <g opacity=".28" stroke="#64748B" stroke-width="2">
      <path d="M38 58h80v60H38zM150 54h64v48h-64zM245 50h118v70H245zM48 155h104v70H48zM190 150h80v58h-80zM305 158h60v86h-60z"/>
      <path d="M74 88h44M165 77h35M260 77h76M69 184h70M205 179h50M320 190h32"/>
    </g>
    <circle cx="220" cy="148" r="62" fill="#111827" opacity=".9"/>
    <rect x="158" y="205" width="124" height="101" rx="50" fill="#111827" opacity=".82"/>
    <circle cx="196" cy="138" r="13" fill="#0F172A"/>
    <circle cx="244" cy="138" r="13" fill="#0F172A"/>
    <rect x="190" y="120" width="60" height="18" rx="9" fill="#0F172A"/>
    <rect x="320" y="34" width="66" height="28" rx="6" fill="#FFFFFF"/>
    <text x="333" y="52" fill="#008A64" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="900">PO DIGITAL</text>
    <text x="44" y="346" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900">KARIM ELFENGOUR</text>
    <text x="44" y="373" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Product Owner Digital &amp; E-Commerce</text>
    <circle cx="370" cy="346" r="5" fill="#00956B"/>
    <g font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#334155">
      <rect x="44" y="397" width="55" height="24" rx="5" fill="#F3F4F6"/>
      <text x="56" y="413">Agile</text>
      <rect x="108" y="397" width="72" height="24" rx="5" fill="#F3F4F6"/>
      <text x="121" y="413">Stratégie</text>
      <rect x="189" y="397" width="91" height="24" rx="5" fill="#F3F4F6"/>
      <text x="203" y="413">Pragmatique</text>
      <rect x="289" y="397" width="85" height="24" rx="5" fill="#F3F4F6"/>
      <text x="302" y="413">Résultats</text>
    </g>
  </g>
</svg>
