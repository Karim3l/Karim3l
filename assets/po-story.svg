<svg width="1200" height="840" viewBox="0 0 1200 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Product Owner value and case study</title>
  <desc id="desc">Value cards and a Saveurs du Marché product story with impact metrics.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#0F172A" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="1200" height="840" rx="24" fill="#FFFFFF"/>
  <line x1="48" y1="18" x2="1152" y2="18" stroke="#D1D5DB"/>

  <text x="58" y="56" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="900">MA VALEUR AJOUTÉE</text>
  <text x="58" y="86" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">Ce que j'apporte à votre équipe produit</text>

  <g transform="translate(58 112)" font-family="Inter, Arial, sans-serif">
    <g>
      <rect width="168" height="146" rx="8" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
      <rect x="18" y="18" width="36" height="36" rx="8" fill="#EEF5FF"/>
      <circle cx="36" cy="36" r="10" stroke="#2563EB" stroke-width="3"/>
      <circle cx="36" cy="36" r="3" fill="#2563EB"/>
      <text x="18" y="78" fill="#0F172A" font-size="13" font-weight="900">Vision &amp; Stratégie</text>
      <text x="18" y="103" fill="#475569" font-size="11" font-weight="700"><tspan x="18">Je comprends le marché,</tspan><tspan x="18" dy="18">les utilisateurs et les</tspan><tspan x="18" dy="18">objectifs business.</tspan></text>
    </g>
    <g transform="translate(183 0)">
      <rect width="168" height="146" rx="8" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
      <rect x="18" y="18" width="36" height="36" rx="8" fill="#DCFCE7"/>
      <path d="M36 25l10 6v11l-10 6-10-6V31l10-6zM36 25v23M26 31l20 11M46 31L26 42" stroke="#00956B" stroke-width="2"/>
      <text x="18" y="78" fill="#0F172A" font-size="13" font-weight="900">Backlog &amp; Priorisation</text>
      <text x="18" y="103" fill="#475569" font-size="11" font-weight="700"><tspan x="18">Je construis un backlog</tspan><tspan x="18" dy="18">clair basé sur valeur,</tspan><tspan x="18" dy="18">effort et impact.</tspan></text>
    </g>
    <g transform="translate(366 0)">
      <rect width="168" height="146" rx="8" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
      <rect x="18" y="18" width="36" height="36" rx="8" fill="#E9F8F2"/>
      <path d="M36 24v24M27 32l9-8 9 8M27 40l9 8 9-8" stroke="#00956B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="18" y="78" fill="#0F172A" font-size="13" font-weight="900">UX &amp; Parcours utilisateur</text>
      <text x="18" y="103" fill="#475569" font-size="11" font-weight="700"><tspan x="18">Je conçois des parcours</tspan><tspan x="18" dy="18">utiles, simples et orientés</tspan><tspan x="18" dy="18">conversion.</tspan></text>
    </g>
    <g transform="translate(549 0)">
      <rect width="168" height="146" rx="8" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
      <rect x="18" y="18" width="36" height="36" rx="8" fill="#E9F8F2"/>
      <path d="M27 43c10 0 7-16 18-16M27 30c10 0 7 16 18 16" stroke="#00956B" stroke-width="3" stroke-linecap="round"/>
