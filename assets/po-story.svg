    <text x="382" y="448" fill="#008A64" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="900">LA JOURNÉE TYPE D'UN PRODUCT OWNER SUR CE PROJET</text>
    <g transform="translate(86 474)" font-family="Inter, Arial, sans-serif" text-anchor="middle">
      <text x="0" y="0" fill="#00956B" font-size="13" font-weight="900">09:00</text><text x="0" y="26" fill="#0F172A" font-size="12" font-weight="800">Daily Scrum</text><text x="0" y="43" fill="#0F172A" font-size="12" font-weight="800">&amp; priorités</text>
      <text x="172" y="0" fill="#00956B" font-size="13" font-weight="900">10:00</text><text x="172" y="26" fill="#0F172A" font-size="12" font-weight="800">Affinage</text><text x="172" y="43" fill="#0F172A" font-size="12" font-weight="800">du backlog</text>
      <text x="344" y="0" fill="#00956B" font-size="13" font-weight="900">11:30</text><text x="344" y="26" fill="#0F172A" font-size="12" font-weight="800">Atelier UX /</text><text x="344" y="43" fill="#0F172A" font-size="12" font-weight="800">Parcours</text>
      <text x="516" y="0" fill="#00956B" font-size="13" font-weight="900">14:00</text><text x="516" y="26" fill="#0F172A" font-size="12" font-weight="800">Suivi</text><text x="516" y="43" fill="#0F172A" font-size="12" font-weight="800">développement</text>
      <text x="688" y="0" fill="#00956B" font-size="13" font-weight="900">15:30</text><text x="688" y="26" fill="#0F172A" font-size="12" font-weight="800">Recette &amp; tests</text>
      <text x="860" y="0" fill="#00956B" font-size="13" font-weight="900">17:00</text><text x="860" y="26" fill="#0F172A" font-size="12" font-weight="800">Analyse KPI &amp;</text><text x="860" y="43" fill="#0F172A" font-size="12" font-weight="800">next steps</text>
