        <circle cx="22" cy="20" r="10" stroke="#475569" stroke-width="2"/><path d="M22 30v8" stroke="#475569" stroke-width="2"/>
        <text x="62" y="20" fill="#0F172A" font-size="30" font-weight="900">92%</text>
        <text x="62" y="48" fill="#475569" font-size="13" font-weight="700">de satisfaction client</text>
