    <text x="22" y="34" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="900">HISTOIRE D'UN PRODUIT</text>
    <text x="22" y="76" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900">Saveurs du Marché</text>
    <text x="22" y="105" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Plateforme e-commerce B2C - Juin 2024 à Août 2025</text>

    <text x="22" y="150" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900">LE CONTEXTE</text>
    <text x="22" y="178" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700"><tspan x="22">L'entreprise vendait ses produits via WhatsApp et en boutique.</tspan><tspan x="22" dy="21">L'objectif : créer une plateforme e-commerce complète,</tspan><tspan x="22" dy="21">automatiser les commandes et améliorer l'expérience client.</tspan></text>

    <text x="22" y="270" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900">MON RÔLE</text>
    <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">
      <circle cx="30" cy="296" r="5" fill="#00956B"/><text x="45" y="300">Cadrage fonctionnel et analyse des besoins</text>
      <circle cx="30" cy="324" r="5" fill="#00956B"/><text x="45" y="328">Définition de la roadmap et priorisation du backlog</text>
      <circle cx="30" cy="352" r="5" fill="#00956B"/><text x="45" y="356">Conception du parcours d'achat et des user stories</text>
      <circle cx="30" cy="380" r="5" fill="#00956B"/><text x="45" y="384">Coordination des équipes et recette fonctionnelle</text>
      <circle cx="30" cy="408" r="5" fill="#00956B"/><text x="45" y="412">Suivi des KPIs et amélioration continue</text>
    </g>

