      <text x="18" y="103" fill="#475569" font-size="11" font-weight="700"><tspan x="18">J'anime les sprints, facilite</tspan><tspan x="18" dy="18">la collaboration et lève</tspan><tspan x="18" dy="18">les obstacles.</tspan></text>
    </g>
