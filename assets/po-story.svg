        <path d="M22 10l10 6v8c0 7-4 12-10 15-6-3-10-8-10-15v-8l10-6zM17 24l4 4 7-10" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
        <text x="62" y="20" fill="#0F172A" font-size="30" font-weight="900">+35%</text>
        <text x="62" y="48" fill="#475569" font-size="13" font-weight="700">de taux de conversion</text>
      </g>
      <g transform="translate(0 298)">
