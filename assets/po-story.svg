      <rect x="310" y="104" width="86" height="170" rx="10" fill="#FFFFFF"/>
      <text x="325" y="126" fill="#008A64" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="900">Commande</text>
      <rect x="324" y="145" width="58" height="38" rx="5" fill="#D9F99D"/>
      <rect x="324" y="193" width="58" height="38" rx="5" fill="#FDBA74"/>
      <rect x="324" y="242" width="58" height="14" rx="7" fill="#00956B"/>
