      <text x="18" y="103" fill="#475569" font-size="11" font-weight="700"><tspan x="18">Je garantis la qualité via</tspan><tspan x="18" dy="18">la recette fonctionnelle</tspan><tspan x="18" dy="18">et la validation.</tspan></text>
    </g>
    <g transform="translate(915 0)">
      <rect width="168" height="146" rx="8" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
      <rect x="18" y="18" width="36" height="36" rx="8" fill="#E9F8F2"/>
